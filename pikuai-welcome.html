<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>PikuAI – Welcome Screen</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet" />
<style>
  /* ── Reset & Base ── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #d8d4f0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Nunito', sans-serif;
    padding: 40px 16px;
  }

  /* ── Phone Shell ── */
  .phone {
    width: 390px;
    min-height: 844px;
    background: #ece9ff;
    border-radius: 54px;
    box-shadow:
      0 0 0 10px #1a1a2e,
      0 0 0 12px #2a2a4e,
      0 40px 80px rgba(0,0,0,.45);
    position: relative;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* Dynamic Island */
  .island {
    width: 120px; height: 34px;
    background: #111;
    border-radius: 20px;
    position: absolute;
    top: 14px; left: 50%; transform: translateX(-50%);
    z-index: 10;
  }

  /* Status bar */
  .status-bar {
    width: 100%;
    padding: 16px 28px 0;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 13px;
    font-weight: 700;
    color: #1a1a2e;
    z-index: 5;
  }
  .status-bar .time { font-size: 15px; font-weight: 800; }
  .status-icons { display: flex; gap: 5px; align-items: center; }
  .status-icons svg { fill: #1a1a2e; }

  /* ── Screen Content ── */
  .screen {
    width: 100%;
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 12px 24px 32px;
    gap: 0;
  }

  /* Logo row */
  .logo-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-top: 14px;
    margin-bottom: 4px;
  }
  .logo-icon {
    width: 48px; height: 48px;
    background: linear-gradient(145deg, #a78bfa, #6d28d9);
    border-radius: 14px;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 4px 14px rgba(109,40,217,.35);
    font-size: 26px;
    line-height: 1;
  }
  .logo-text {
    font-size: 32px;
    font-weight: 900;
    color: #6d28d9;
    letter-spacing: -0.5px;
  }

  /* Hero illustration area */
  .hero-area {
    width: 100%;
    height: 230px;
    position: relative;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    margin-bottom: -6px;
  }

  /* Cloud decorations */
  .cloud {
    position: absolute;
    background: white;
    border-radius: 50px;
    opacity: 0.85;
  }
  .cloud::before, .cloud::after {
    content: '';
    position: absolute;
    background: white;
    border-radius: 50%;
  }
  .cloud-l {
    width: 70px; height: 22px;
    top: 28px; left: 14px;
  }
  .cloud-l::before { width: 30px; height: 30px; top: -14px; left: 10px; }
  .cloud-l::after  { width: 22px; height: 22px; top: -10px; left: 28px; }
  .cloud-r {
    width: 55px; height: 18px;
    top: 18px; right: 20px;
  }
  .cloud-r::before { width: 24px; height: 24px; top: -12px; left: 8px; }
  .cloud-r::after  { width: 18px; height: 18px; top: -8px;  left: 22px; }

  /* Stars */
  .star {
    position: absolute;
    font-size: 22px;
    animation: twinkle 2.5s ease-in-out infinite alternate;
  }
  .star-1 { top: 46px; left: 56px;  animation-delay: 0s; }
  .star-2 { top: 30px; left: 130px; animation-delay: 0.8s; font-size: 16px; }
  .star-3 { top: 50px; right: 62px; animation-delay: 1.4s; font-size: 18px; }
  @keyframes twinkle {
    from { opacity: 1; transform: scale(1) rotate(-5deg); }
    to   { opacity: 0.55; transform: scale(0.85) rotate(8deg); }
  }

  /* SVG Family Group */
  .family-svg { width: 310px; position: absolute; bottom: 0; }

  /* ── Heading ── */
  .welcome-heading {
    font-size: 26px;
    font-weight: 900;
    color: #1a1a2e;
    text-align: center;
    margin-top: 10px;
    letter-spacing: -0.3px;
  }
  .welcome-sub {
    font-size: 14.5px;
    font-weight: 600;
    color: #555577;
    text-align: center;
    line-height: 1.55;
    margin-top: 6px;
    padding: 0 10px;
  }

  /* ── Feature Card ── */
  .feature-card {
    background: #ddd8f8;
    border-radius: 22px;
    width: 100%;
    padding: 20px 20px 18px;
    margin-top: 18px;
    position: relative;
    overflow: visible;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }
  .feature-card-title {
    font-size: 18px;
    font-weight: 900;
    color: #1a1a2e;
    line-height: 1.3;
    max-width: 200px;
  }
  .icon-row { display: flex; gap: 12px; align-items: center; }

  .icon-btn {
    width: 52px; height: 52px;
    background: white;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 3px 10px rgba(0,0,0,.1);
    transition: transform .18s;
    cursor: pointer;
  }
  .icon-btn:hover { transform: scale(1.08); }
  .icon-btn svg { width: 24px; height: 24px; }

  /* Chick mascot on card */
  .chick-mascot {
    position: absolute;
    right: 12px;
    bottom: 10px;
    width: 90px;
    pointer-events: none;
  }

  /* Sparkle dots on card */
  .sparkle {
    position: absolute;
    width: 6px; height: 6px;
    background: white;
    border-radius: 50%;
    opacity: 0.7;
  }
  .sp1 { top: 14px; right: 110px; }
  .sp2 { top: 34px; right: 94px;  width: 4px; height: 4px; }
  .sp3 { top: 50px; right: 130px; width: 4px; height: 4px; }

  /* ── Pagination Dots ── */
  .dots {
    display: flex; gap: 7px;
    align-items: center;
    margin-top: 20px;
  }
  .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: #b8b0e0;
    transition: all .25s;
  }
  .dot.active {
    width: 22px;
    border-radius: 5px;
    background: #6d28d9;
  }

  /* ── CTA Button ── */
  .btn-primary {
    margin-top: 22px;
    width: 100%;
    padding: 18px;
    border-radius: 50px;
    border: none;
    background: linear-gradient(135deg, #7c3aed, #5b21b6);
    color: white;
    font-family: 'Nunito', sans-serif;
    font-size: 17px;
    font-weight: 800;
    letter-spacing: 0.3px;
    cursor: pointer;
    box-shadow: 0 8px 24px rgba(109,40,217,.4);
    transition: transform .18s, box-shadow .18s;
  }
  .btn-primary:hover {
    transform: translateY(-2px);
    box-shadow: 0 12px 30px rgba(109,40,217,.5);
  }
  .btn-primary:active { transform: translateY(0); }

  /* Sign-in link */
  .signin-row {
    margin-top: 16px;
    font-size: 13.5px;
    font-weight: 600;
    color: #666688;
  }
  .signin-row a { color: #6d28d9; text-decoration: none; font-weight: 800; }
</style>
</head>
